
services:
  postgres:
    image: postgres:18
    container_name: postgres-warehouse
    environment:
      POSTGRES_USER: warehouse_manager
      POSTGRES_PASSWORD: hello_world_123
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-warehouse
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: hello#123
    ports:
      - "5050:80"

volumes:
  postgres-data:
